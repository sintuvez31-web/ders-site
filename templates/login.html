<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İLY TEACHER - Giriş</title>
    <style>
        :root { --bg-color: #f0f4f8; --card-bg: #ffffff; --text-color: #333333; --input-border: #bbbbbb; --label-color: #444444; --box-bg: #f8f9fa; }
        [data-theme="dark"] { --bg-color: #121212; --card-bg: #1e1e1e; --text-color: #e0e0e0; --input-border: #444444; --label-color: #bbbbbb; --box-bg: #2d2d2d; }
        body { font-family: Arial, sans-serif; background: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px 0; transition: background 0.3s ease; }
        .login-container { background: var(--card-bg); padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); width: 420px; text-align: center; }
        h1 { color: #007bff; font-size: 40px; margin-top: 10px; margin-bottom: 20px; font-weight: bold; }
        .indirim-banner { background: linear-gradient(135deg, #ff416c, #ff4b2b); color: white; padding: 15px; border-radius: 10px; font-size: 26px; margin-bottom: 25px; }
        label { display: block; text-align: left; font-size: 20px; font-weight: bold; margin-top: 15px; color: var(--label-color); }
        input[type="text"], input[type="password"] { width: 100%; padding: 15px; margin-top: 5px; border: 2px solid var(--input-border); border-radius: 8px; box-sizing: border-box; font-size: 20px; background: var(--card-bg); color: var(--text-color); }
        button { width: 100%; padding: 18px; background: #28a745; border: none; color: white; border-radius: 8px; cursor: pointer; font-size: 22px; font-weight: bold; margin-top: 25px; }
        .error { color: #dc3545; font-size: 18px; font-weight: bold; background: #f8d7da; padding: 10px; border-radius: 5px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="login-container">
    <h1>İLY TEACHER</h1>
    <div class="indirim-banner">🔥 %10 NAKİT İNDİRİMİ!</div>

    {% if hata %} <p class="error">{{ hata }}</p> {% endif %}

    <form method="POST">
        <label for="username">Kullanıcı Adınız:</label>
        <input type="text" id="username" name="username" placeholder="Örn: veli123" required>
        <label for="password">Şifreniz:</label>
        <input type="password" id="password" name="password" placeholder="••••" required>
        <button type="submit">Sisteme Giriş Yap</button>
    </form>
</div>
</body>
</html>
