<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İLY TEACHER - Giriş</title>
    <style>
        body { font-family: Arial; background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-container { background: white; padding: 40px; border-radius: 16px; width: 420px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #007bff; font-size: 40px; }
        .indirim-banner { background: linear-gradient(135deg, #ff416c, #ff4b2b); color: white; padding: 15px; border-radius: 10px; margin-bottom: 25px; font-weight: bold; }
        .error { color: #dc3545; font-weight: bold; padding: 10px; background: #f8d7da; border-radius: 5px; margin-bottom: 15px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 18px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>
<div class="login-container">
    <h1>İLY TEACHER</h1>
    <div class="indirim-banner">🔥 %10 NAKİT İNDİRİMİ!</div>
    
    {% if hata %} <p class="error">{{ hata }}</p> {% endif %}
    
    <form method="POST">
        <input type="text" name="username" placeholder="Kullanıcı Adı" required>
        <input type="password" name="password" placeholder="Şifre" required>
        <button type="submit">Sisteme Giriş Yap</button>
    </form>
</div>
</body>
</html>
