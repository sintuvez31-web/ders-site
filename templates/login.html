<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İLY TEACHER - Giriş</title>
    <style>
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #0f172a; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .wrapper { display: flex; flex-direction: row; gap: 30px; align-items: center; justify-content: center; width: 100%; max-width: 1000px; }
        
        .login-container { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px);
            padding: 40px; 
            border-radius: 20px; 
            width: 400px; 
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        h1 { color: #ffffff; font-size: 28px; margin-bottom: 5px; }
        p.subtitle { color: #94a3b8; margin-bottom: 25px; }
        
        .indirim-banner { 
            background: linear-gradient(90deg, #3b82f6, #8b5cf6); 
            color: white; padding: 10px; border-radius: 10px; font-weight: bold; margin-bottom: 25px; font-size: 0.9rem;
        }
        
        input { 
            width: 100%; padding: 14px; margin: 10px 0; background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; color: white; font-size: 16px; box-sizing: border-box;
        }
        input::placeholder { color: #94a3b8; }
        
        button { 
            width: 100%; padding: 15px; background: #3b82f6; color: white; border: none; 
            border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 15px; transition: 0.3s;
        }
        button:hover { background: #2563eb; transform: translateY(-2px); }
        
        /* Sağ/Sol panelleri biraz daha hafiflettik */
        .side-panel { color: #94a3b8; max-width: 250px; line-height: 1.6; }
        
        @media (max-width: 950px) { .wrapper { flex-direction: column; } .side-panel { display: none; } }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="side-panel">
        <h3>İLY TEACHER</h3>
        <p>Eğitimde yeni nesil deneyim. Başarıya giden yolda yanındayız.</p>
    </div>

    <div class="login-container">
        <h1>Giriş Yap</h1>
        <p class="subtitle">Eğitim paneline devam etmek için</p>
        
        <div class="indirim-banner">🔥 %10 NAKİT İNDİRİMİ DEVAM EDİYOR!</div>
        
        {% if hata %} 
            <p style="color: #fb7185; font-weight:bold; margin-bottom:15px;">{{ hata }}</p> 
        {% endif %}
        
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Kullanıcı Adı" required>
            <input type="password" name="password" placeholder="Şifre" required>
            <button type="submit">Giriş Yap</button>
        </form>
    </div>

    <div class="side-panel">
        <h3>Neden Biz?</h3>
        <p>✓ Kişiye özel ders planı<br>✓ Konuşma odaklı eğitim<br>✓ Hedef garantili çalışma</p>
    </div>
</div>

</body>
</html>
