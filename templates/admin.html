<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İLY TEACHER - Yönetim Paneli</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 250px; background: var(--primary); color: white; height: 100vh; padding: 20px; position: fixed; }
        .sidebar h2 { font-size: 20px; text-align: center; margin-bottom: 30px; }
        .sidebar a { color: #bdc3c7; display: block; padding: 10px; text-decoration: none; border-bottom: 1px solid #34495e; }
        .sidebar a:hover { color: white; background: #34495e; }

        /* Main Content */
        .main { margin-left: 290px; padding: 30px; width: calc(100% - 320px); }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* Form */
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; width: 100%; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }

        /* Tablo */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; padding: 15px; text-align: left; border-bottom: 2px solid #dee2e6; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        .badge { background: #e1f5fe; color: #0288d1; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>İLY TEACHER PANEL</h2>
    <a href="/admin">Genel Bakış</a>
    <a href="/logout" style="color: #e74c3c; margin-top: 50px;">Çıkış Yap</a>
</div>

<div class="main">
    <h1>Yönetim Paneli</h1>

    <div class="card">
        <h3>Yeni Öğrenci Ekle</h3>
        <form action="/add_student" method="POST" style="display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px;">
            <input type="text" name="username" placeholder="Kullanıcı Adı" required>
            <input type="text" name="name" placeholder="Ad Soyad" required>
            <input type="password" name="password" placeholder="Şifre" required>
            <button type="submit">Ekle</button>
        </form>
    </div>

    <div class="card">
        <h3>Öğrenci Listesi</h3>
        <table>
            <thead>
                <tr>
                    <th>Kullanıcı Adı</th>
                    <th>Ad Soyad</th>
                    <th>Durum</th>
                </tr>
            </thead>
            <tbody>
                {% if students %}
                    {% for username, info in students.items() %}
                    <tr>
                        <td><strong>{{ username }}</strong></td>
                        <td>{{ info.name }}</td>
                        <td><span class="badge">Aktif</span></td>
                    </tr>
                    {% endfor %}
                {% else %}
                    <tr>
                        <td colspan="3" style="text-align:center; color: #888;">Henüz kayıtlı öğrenci yok.</td>
                    </tr>
                {% endif %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
