<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Admin Paneli</title>
</head>
<body>
    <h1>Admin Paneli</h1>
    
    <a href="/admin/add" style="display: inline-block; background: green; color: white; padding: 10px; text-decoration: none; border-radius: 5px;">+ Yeni Öğrenci Ekle</a>
    <a href="/logout" style="margin-left: 10px; color: red;">Çıkış Yap</a>
    
    <hr>
    
    <h2>Kayıtlı Öğrenciler</h2>
    <table border="1" cellpadding="10">
        <tr>
            <th>Kullanıcı Adı</th>
            <th>Ad Soyad</th>
        </tr>
        {% for username, data in students.items() %}
        <tr>
            <td>{{ username }}</td>
            <td>{{ data.name }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
